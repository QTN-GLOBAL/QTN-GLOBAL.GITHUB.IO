<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>QTN GLOBAL Control Center</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="css/admin.css">

</head>

<body>

    <!-- =========================
         LOGIN CONTAINER
    ========================== -->

    <main class="admin-login">

        <!-- LOGO -->

        <div class="admin-logo">

            <h1>QTN GLOBAL</h1>

            <p>CONTROL CENTER</p>

        </div>

        <!-- LOGIN FORM -->

        <form
            id="loginForm"
            class="login-form">

            <div class="form-group">

                <label>Tài khoản</label>

                <input
                    type="text"
                    id="username"
                    autocomplete="username"
                    required>

            </div>

            <div class="form-group">

                <label>Mật khẩu</label>

                <input
                    type="password"
                    id="password"
                    autocomplete="current-password"
                    required>

            </div>

            <button
                type="submit">

                ĐĂNG NHẬP

            </button>

        </form>

    </main>

    <!-- JS -->

    <script src="js/admin.js"></script>

</body>

</html>
