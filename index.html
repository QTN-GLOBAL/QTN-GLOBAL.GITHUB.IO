<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QTN GLOBAL</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER GIỮ NGUYÊN -->
<header class="header">

<div class="top-header">

<div class="logo-area">
<img src="images/logo.png">
<div class="company-info">
<h2>QTN GLOBAL</h2>
<p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>
</div>
</div>

<div class="top-contact">

<a href="javascript:void(0)" onclick="openCart()">
🛒 GIỎ HÀNG (<span id="cartCount">0</span>)
</a>

</div>

</div>

<!-- MENU GIỮ NGUYÊN -->
<nav class="navbar">

<a href="index.html">TRANG CHỦ</a>

<a href="#" onclick="filterProducts('can-ban')">Cân bàn</a>
<a href="#" onclick="filterProducts('can-dem')">Cân đếm</a>
<a href="#" onclick="filterProducts('can-treo')">Cân treo</a>

</nav>

</header>

<!-- HERO GIỮ NGUYÊN (KHÔNG PHÁ CSS) -->
<section class="hero">

<div class="hero-left">

<h1>
GIẢI PHÁP<br>
<span class="highlight">CÂN ĐIỆN TỬ</span>
</h1>

</div>

<div class="hero-right">

<div class="banner-slider">
<img id="bannerImage" src="images/can-ban/jwl/main.jpg">
</div>

</div>

</section>

<!-- MAIN GIỮ NGUYÊN CLASS CŨ -->
<section class="main-layout">

<aside class="sidebar">

<h2>DANH MỤC</h2>

<ul>
<li onclick="filterProducts('can-ban')">Cân bàn</li>
<li onclick="filterProducts('can-dem')">Cân đếm</li>
<li onclick="filterProducts('can-treo')">Cân treo</li>
</ul>

</aside>

<!-- QUAN TRỌNG: GIỮ ĐÚNG ID -->
<main class="product-grid" id="productGrid"></main>

</section>

<!-- CART GIỮ NGUYÊN -->
<div id="cartOverlay" onclick="closeCart()"></div>

<div id="cartModal">

<div class="cart-header">
<h2>Giỏ hàng</h2>
<button onclick="closeCart()">✕</button>
</div>

<div id="cartBody"></div>

</div>

<!-- SCRIPT -->
<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
