<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QTN GLOBAL</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="top-header">

    <div class="logo-area">
      <img src="images/logo.png">
      <div>
        <h2>QTN GLOBAL</h2>
        <p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>
      </div>
    </div>

    <div class="top-contact">

      <a href="javascript:void(0)" class="cart-header" onclick="openCart()">
        🛒 GIỎ HÀNG (<span id="cartCount">0</span>)
      </a>

    </div>

  </div>

</header>

<!-- PRODUCT GRID -->
<main class="grid" id="productGrid"></main>

<!-- CART -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-modal" id="cartModal">
  <div class="cart-header">
    <h3>Giỏ hàng của bạn</h3>
    <button onclick="closeCart()">✕</button>
  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">
    <button onclick="openCheckout()">MUA NGAY</button>
  </div>
</div>

<script src="products.js"></script>
<script src="giohang.js"></script>
<script src="script.js"></script>

</body>
</html>
