<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QTN GLOBAL</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="top-header">

    <div class="logo-area">
      <img src="images/logo.png" alt="QTN GLOBAL">

      <div class="company-info">
        <h2>QTN GLOBAL</h2>
        <p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>
      </div>
    </div>

    <div class="top-contact">

      <a href="tel:0905913636" class="top-btn">
        <i class="fa-solid fa-phone"></i> 0905 913 636
      </a>

      <a href="tel:0383598603" class="top-btn">
        <i class="fa-solid fa-phone"></i> 0383 598 603
      </a>

      <!-- CART -->
      <a class="cart-header" href="javascript:void(0)" onclick="openCart()">
        🛒 GIỎ HÀNG (<span id="cartCount">0</span>)
      </a>

    </div>

  </div>

  <!-- MENU -->
  <nav class="navbar">
    <a href="index.html">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">LIÊN HỆ</a>
  </nav>

</header>

<!-- HERO -->
<section class="hero">

  <div class="hero-left">
    <h1>
      GIẢI PHÁP<br>
      <span class="highlight">CÂN ĐIỆN TỬ</span><br>
      CHÍNH XÁC CHO DOANH NGHIỆP
    </h1>
  </div>

  <div class="hero-right">
    <img src="images/can-ban/jadever-jwl/main.jpg" style="width:100%">
  </div>

</section>

<!-- MAIN -->
<section class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>DANH MỤC</h2>
    <ul>
      <li onclick="filterProducts('can-ban')">Cân bàn</li>
      <li onclick="filterProducts('can-dem')">Cân đếm</li>
      <li onclick="filterProducts('can-ky-thuat')">Cân kỹ thuật</li>
      <li onclick="filterProducts('can-treo')">Cân treo</li>
      <li onclick="filterProducts('can-san')">Cân sàn</li>
    </ul>
  </aside>

  <!-- PRODUCT GRID -->
  <main id="productGrid" class="product-grid"></main>

</section>

<!-- CART POPUP -->
<div id="cartOverlay" class="overlay" onclick="closeCart()"></div>

<div id="cartModal" class="cart">

  <div class="cart-header">
    <h2>Giỏ hàng</h2>
    <button onclick="closeCart()">✕</button>
  </div>

  <div id="cartBody"></div>

  <button class="btn-buy" onclick="sendZalo()">
    Gửi đơn Zalo
  </button>

  <button class="btn-buy messenger" onclick="sendMessenger()">
    Gửi Messenger
  </button>

</div>

<!-- SCRIPT -->
<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
