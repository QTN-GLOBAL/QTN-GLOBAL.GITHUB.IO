<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QTN GLOBAL - Cân Điện Tử</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>QTN GLOBAL</h1>
    <p>Cân điện tử công nghiệp chính hãng</p>
</header>

<div class="cart-box">
    🛒 Giỏ hàng: <span id="cart-count">0</span>
</div>

<div id="product-list"></div>

<hr>

<div class="checkout-box">
    <h2>Đặt hàng</h2>

    <input type="text" id="name" placeholder="Họ tên">
    <input type="tel" id="phone" placeholder="Số điện thoại">
    <input type="text" id="address" placeholder="Địa chỉ">

    <button onclick="checkout()">📩 Gửi đơn hàng</button>
</div>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
