<!-- PAGE -->

<section class="cart-page">

    <h1>
        GIỎ HÀNG CỦA BẠN
    </h1>

    <div id="cartPageItems"
         class="cart-page-items">

    </div>

</section>

<!-- POPUP MUA NGAY -->

<div class="popup-overlay"
     id="buyNowPopup">

    <div class="popup-box buy-popup">

        <span class="close-popup"
              onclick="closeBuyNowPopup()">

              ×

        </span>

        <h2>
            THÔNG TIN ĐẶT HÀNG
        </h2>

        <form id="buyNowForm">

            <input type="text"
                   id="customerName"
                   placeholder="Tên khách hàng"
                   required>

            <input type="text"
                   id="customerPhone"
                   placeholder="Số điện thoại"
                   required>

            <input type="text"
                   id="customerCompany"
                   placeholder="Công ty">

            <input type="text"
                   id="customerTax"
                   placeholder="Mã số thuế">

            <textarea id="customerBillAddress"
                      placeholder="Địa chỉ viết hóa đơn"></textarea>

            <textarea id="customerShipAddress"
                      placeholder="Địa chỉ giao hàng"></textarea>

            <input type="text"
                   id="productOrderName"
                   readonly>

            <input type="text"
                   id="productOrderWeight"
                   placeholder="Mức cân">

            <input type="number"
                   id="productOrderQty"
                   value="1"
                   min="1">

            <div class="buy-buttons">

                <button type="button"
                        class="zalo-send"
                        onclick="sendOrderZalo()">

                    Gửi đơn qua Zalo

                </button>

                <button type="button"
                        class="messenger-send"
                        onclick="sendOrderMessenger()">

                    Gửi đơn qua Messenger

                </button>

            </div>

        </form>

    </div>

</div>

<!-- JS -->

<script src="products.js"></script>

<script src="script.js"></script>

<script>

/* =========================
   LOAD CART
========================= */

renderCartPage();

updateCartCount();

/* =========================
   RENDER CART PAGE
========================= */

function renderCartPage(){

    const cart =
    JSON.parse(
        localStorage.getItem("cart")
    ) || [];

    const box =
    document.getElementById("cartPageItems");

    if(cart.length === 0){

        box.innerHTML = `

        <div class="empty-cart">

            <i class="fa-solid fa-cart-shopping"></i>

            <p>
                Giỏ hàng đang trống
            </p>

        </div>

        `;

        return;

    }

    let html = "";

    cart.forEach((item,index)=>{

        html += `

        <div class="cart-item">

            <div class="cart-item-left">

                <img src="
                images/${item.category}/${item.folder}/1.jpg
                "
                alt="${item.name}">

            </div>

            <div class="cart-item-right">

                <h3>
                    ${item.name}
                </h3>

                <p>
                    <strong>Mức cân:</strong>
                    ${item.weight}
                </p>

                <div class="qty-box">

                    <button onclick="
                    decreaseQty(${index})
                    ">

                        -

                    </button>

                    <span>
                        ${item.qty}
                    </span>

                    <button onclick="
                    increaseQty(${index})
                    ">

                        +

                    </button>

                </div>

                <button class="buy-cart-btn"
                        onclick="
                        buyCartItem(
                        '${item.name}',
                        '${item.weight}',
                        '${item.qty}'
                        )
                        ">

                    MUA NGAY

                </button>

            </div>

        </div>

        `;

    });

    box.innerHTML = html;

}

/* =========================
   INCREASE QTY
========================= */

function increaseQty(index){

    let cart =
    JSON.parse(
        localStorage.getItem("cart")
    ) || [];

    cart[index].qty++;

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCartPage();

    updateCartCount();

}

/* =========================
   DECREASE QTY
========================= */

function decreaseQty(index){

    let cart =
    JSON.parse(
        localStorage.getItem("cart")
    ) || [];

    cart[index].qty--;

    if(cart[index].qty <= 0){

        cart.splice(index,1);

    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCartPage();

    updateCartCount();

}

/* =========================
   BUY ITEM
========================= */

function buyCartItem(
    name,
    weight,
    qty
){

    document.getElementById(
        "buyNowPopup"
    ).classList.add("active");

    document.getElementById(
        "productOrderName"
    ).value = name;

    document.getElementById(
        "productOrderWeight"
    ).value = weight;

    document.getElementById(
        "productOrderQty"
    ).value = qty;

}

</script>

</body>
