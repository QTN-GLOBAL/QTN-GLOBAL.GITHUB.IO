<!-- =========================
     VIEW CART POPUP
========================= -->

<div class="popup-overlay"
     id="viewCartPopup">

    <div class="popup-box view-cart-box">

        <span class="close-popup"
              onclick="closeViewCartPopup()">

            &times;

        </span>

        <h2>GIỎ HÀNG CỦA BẠN</h2>

        <!-- CART ITEMS -->

        <div id="cartItems">

        </div>

        <!-- FOOTER -->

        <div class="cart-footer">

            <h3>

                Tổng sản phẩm:
                <span id="cartTotalQty">

                    0

                </span>

            </h3>

            <div class="cart-footer-buttons">

                <!-- CLEAR -->

                <button class="clear-cart-btn"
                        onclick="clearCart()">

                    XÓA GIỎ HÀNG

                </button>

                <!-- ZALO -->

                <button class="cart-zalo-btn"
                        onclick="sendCartToZalo()">

                    GỬI ĐƠN QUA ZALO

                </button>

                <!-- MESSENGER -->

                <button class="cart-messenger-btn"
                        onclick="
                        sendCartToMessenger()
                        ">

                    GỬI QUA MESSENGER

                </button>

            </div>

        </div>

    </div>

</div>
