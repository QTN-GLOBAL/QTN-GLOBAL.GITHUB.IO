<!-- CART PAGE -->

<div class="cart-page">

    <h1>
        GIỎ HÀNG CỦA BẠN
    </h1>

    <div id="cartPageItems"
         class="cart-page-items">

    </div>

</div>

<!-- POPUP MUA NGAY -->

<div class="popup-overlay"
     id="buyNowPopup">

    <div class="popup-box buy-box">

        <span class="close-popup"
              onclick="closeBuyNowPopup()">

              ×

        </span>

        <h2>
            ĐẶT HÀNG
        </h2>

        <input type="text"
               id="customerName"
               placeholder="Tên khách hàng">

        <input type="text"
               id="customerPhone"
               placeholder="Số điện thoại">

        <input type="text"
               id="customerCompany"
               placeholder="Công ty">

        <input type="text"
               id="customerTax"
               placeholder="Mã số thuế">

        <textarea id="customerInvoice"
                  placeholder="Địa chỉ viết hóa đơn"></textarea>

        <textarea id="customerAddress"
                  placeholder="Địa chỉ giao hàng"></textarea>

        <input type="text"
               id="buyProductName"
               readonly>

        <input type="text"
               id="buyWeight"
               readonly>

        <input type="number"
               id="buyQty"
               value="1"
               min="1">

        <div class="buy-buttons">

            <button class="zalo-btn"
                    onclick="sendOrderZalo()">

                GỬI ĐƠN QUA ZALO

            </button>

            <button class="messenger-btn"
                    onclick="sendOrderMessenger()">

                GỬI ĐƠN QUA MESSENGER

            </button>

        </div>

    </div>

</div>

<!-- JS -->

<script src="products.js"></script>

<script src="script.js"></script>

<script>

const cartPageItems =
document.getElementById("cartPageItems");

function renderCartPage(){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    updateCartCount();

    if(cart.length === 0){

        cartPageItems.innerHTML = `

        <div class="empty-cart">

            <i class="fa-solid fa-cart-shopping"></i>

            <p>
                Giỏ hàng đang trống
            </p>

            <a href="index.html"
               class="continue-btn">

               TIẾP TỤC MUA HÀNG

            </a>

        </div>

        `;

        return;

    }

    let html = "";

    cart.forEach((item,index)=>{

        html += `

        <div class="cart-page-card">

            <div class="cart-page-image">

                <img src="
                images/${item.category}/${item.folder}/1.jpg
                "
                alt="${item.name}">

            </div>

            <div class="cart-page-info">

                <h3>
                    ${item.name}
                </h3>

                <p>
                    <strong>Mức cân:</strong>
                    ${item.weight}
                </p>

                <div class="cart-qty">

                    <button onclick="
                    changeCartQty(${index},-1)
                    ">
                        -
                    </button>

                    <span>
                        ${item.qty}
                    </span>

                    <button onclick="
                    changeCartQty(${index},1)
                    ">
                        +
                    </button>

                </div>

                <button class="buy-btn"
                        onclick="
                        buyCartItem(
                        '${item.name}',
                        '${item.weight}',
                        ${item.qty}
                        )
                        ">

                    MUA NGAY

                </button>

            </div>

        </div>

        `;

    });

    cartPageItems.innerHTML = html;

}

function changeCartQty(index,change){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    cart[index].qty += change;

    if(cart[index].qty <= 0){

        cart.splice(index,1);

    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    renderCartPage();

}

function buyCartItem(name,weight,qty){

    document.getElementById(
        "buyNowPopup"
    ).style.display = "flex";

    document.getElementById(
        "buyProductName"
    ).value = name;

    document.getElementById(
        "buyWeight"
    ).value = weight;

    document.getElementById(
        "buyQty"
    ).value = qty;

}

renderCartPage();

</script>

</body>
