<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - QTN GLOBAL</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .cart-container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
            gap: 10px;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

        .info {
            flex: 1;
            margin-left: 10px;
        }

        .price {
            color: red;
            font-weight: bold;
        }

        .qty button {
            padding: 5px 10px;
        }

        .qty span {
            margin: 0 10px;
        }

        .remove {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .total {
            text-align: right;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #777;
        }
    </style>
</head>

<body>

<h1>🛒 Giỏ hàng của bạn</h1>

<div class="cart-container">
    <div id="cart-list"></div>

    <div class="total" id="total"></div>
</div>

<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let list = document.getElementById("cart-list");
    let totalBox = document.getElementById("total");

    list.innerHTML = "";

    if (cart.length === 0) {
        list.innerHTML = "<p class='empty'>Giỏ hàng đang trống</p>";
        totalBox.innerHTML = "";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.quantity;

        list.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}">

                <div class="info">
                    <h3>${item.name}</h3>
                    <div class="price">${item.price.toLocaleString()} đ</div>
                </div>

                <div class="qty">
                    <button onclick="changeQty(${index}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="changeQty(${index}, 1)">+</button>
                </div>

                <button class="remove" onclick="removeItem(${index})">Xóa</button>
            </div>
        `;
    });

    totalBox.innerHTML = "Tổng tiền: " + total.toLocaleString() + " đ";
}

function changeQty(index, change) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
    updateCartCount();
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
    updateCartCount();
}

// cập nhật icon giỏ hàng (nếu có trên header)
function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let count = cart.reduce((sum, item) => sum + item.quantity, 0);

    let el = document.getElementById("cart-count");
    if (el) el.innerText = count;
}

loadCart();
updateCartCount();
</script>

</body>
</html>
