<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header class="header">
    <div class="top-header">
        <div class="logo-area">
            <img src="images/logo.png">
            <div class="company-info">
                <h2>QTN GLOBAL</h2>
            </div>
        </div>

        <div class="top-contact">
            <a href="javascript:void(0)" onclick="openCart()">
                🛒 (<span id="cartCount">0</span>)
            </a>
        </div>
    </div>
</header>

<div class="detail-page">

    <div class="detail-left">
        <img id="mainImage">

        <div id="thumbList"></div>

        <div class="detail-buttons">
            <button onclick="openAddCart()">THÊM GIỎ</button>
            <button onclick="openBuy()">MUA NGAY</button>
        </div>
    </div>

    <div class="detail-right">
        <h1 id="productName"></h1>
        <p><b>Hãng:</b> <span id="productBrand"></span></p>
        <p><b>Xuất xứ:</b> <span id="productOrigin"></span></p>

        <h3>Mô tả</h3>
        <p id="productDesc"></p>

        <h3>Thông số</h3>
        <div id="productSpecs"></div>
    </div>

</div>

<!-- CART -->
<div id="cartOverlay" onclick="closeCart()"></div>
<div id="cartModal">
    <h3>Giỏ hàng</h3>
    <div id="cartBody"></div>
</div>

<!-- POPUP ADD -->
<div id="popupAdd" class="popup-overlay">
    <div class="popup-box">
        <span onclick="closeAdd()">✕</span>
        <h3>Thêm giỏ hàng</h3>
        <button onclick="confirmAdd()">Xác nhận</button>
    </div>
</div>

<!-- POPUP BUY -->
<div id="popupBuy" class="popup-overlay">
    <div class="popup-box">
        <span onclick="closeBuy()">✕</span>
        <h3>Đặt hàng</h3>

        <input id="cusName" placeholder="Tên">
        <input id="cusPhone" placeholder="SĐT">

        <button onclick="sendOrder()">Gửi Zalo</button>
    </div>
</div>

<script src="products.js"></script>
<script src="script.js"></script>
<script src="chitiet.js"></script>

</body>
</html>
