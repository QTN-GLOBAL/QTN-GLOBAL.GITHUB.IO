<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Chi tiết sản phẩm</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="detail-page">

<div class="detail-container">

<div class="slider-area">

<div class="slider-wrapper">

<button class="prev-btn" onclick="prevSlide()">❮</button>

<img id="mainImage" class="main-image">

<button class="next-btn" onclick="nextSlide()">❯</button>

</div>

<div class="thumb-list" id="thumbList"></div>

</div>

<div class="detail-info">

<h1 id="productName"></h1>

<p>
<b>Thương hiệu:</b>
<span id="productBrand"></span>
</p>
<p>
<b>Xuất xứ:</b>
<span id="productOrigin"></span>
</p>

<p id="productDescription"></p>

<h3>Thông số kỹ thuật</h3>

<ul id="productSpecs"></ul>

</div>

</div>

</div>

<script src="products.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const id = Number(params.get("id"));

const product = products.find(p=>p.id === id);

document.getElementById("productName").innerText = product.name;

document.getElementById("productBrand").innerText = product.brand;

document.getElementById("productDescription").innerText = product.description;

const specs = document.getElementById("productSpecs");

product.specs.forEach(spec=>{

specs.innerHTML += `<li>${spec}</li>`;

});

const basePath = `images/${product.category}/${product.folder}`;

let images = [];

for(let i = 1; i <= 5; i++){

    const img = new Image();

    img.src = `${basePath}/${i}.jpg`;

    img.onload = function(){

        if(!images.includes(img.src)){

            images.push(img.src);

            renderThumbs();

        }

    };

}

function renderThumbs(){

    if(images.length === 0) return;

    mainImage.src = images[currentSlide];

    thumbList.innerHTML = "";

    images.forEach((img,index)=>{

        thumbList.innerHTML += `
        <img src="${img}" onclick="showSlide(${index})">
        `;

    });

}

let currentSlide = 0;

const mainImage = document.getElementById("mainImage");

const thumbList = document.getElementById("thumbList");

function showSlide(index){

currentSlide = index;

mainImage.src = images[index];

}

function nextSlide(){

currentSlide++;

if(currentSlide >= images.length){
currentSlide = 0;
}

mainImage.src = images[currentSlide];

}

function prevSlide(){

currentSlide--;

if(currentSlide < 0){
currentSlide = images.length - 1;
}

mainImage.src = images[currentSlide];

}

setInterval(()=>{

nextSlide();

},3000);

</script>

</body>
</html>
