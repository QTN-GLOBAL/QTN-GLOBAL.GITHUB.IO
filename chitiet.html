<!-- DETAIL -->

<!-- POPUP GIỎ HÀNG -->

<div class="popup-overlay"
     id="cartPopup">

    <div class="popup-box">

        <span class="close-popup"
              onclick="closeCartPopup()">

        </span>

            THÊM VÀO GIỎ HÀNG
        </h2>

             id="popupProductName">

        </label>

<!-- POPUP MUA NGAY -->

     id="buyNowPopup">

        </h2>

               id="buyProductName"

               id="buyQty"
               value="1"
               min="1">

        <div class="buy-buttons">

            <button class="zalo-btn"
                    onclick="sendOrderZalo()">

                GỬI ĐƠN QUA ZALO

            </button>

            <button class="messenger-btn"
                    onclick="sendOrderMessenger()">

                GỬI ĐƠN QUA MESSENGER

<!-- VIEW CART -->

<div class="popup-overlay"
     id="viewCartPopup">

    <div class="popup-box cart-view-box">

        <span class="close-popup"
              onclick="closeViewCartPopup()">

              ×

        </span>

        <h2>
            GIỎ HÀNG CỦA BẠN
        </h2>

        <div id="cartItems"></div>

    </div>

</div>

<!-- JS -->

<script src="products.js"></script>

<script src="script.js"></script>

<script>

const params =
new URLSearchParams(window.location.search);

const id =
parseInt(params.get("id"));

const product =
products.find(p => p.id === id);

const detailContainer =
document.getElementById("detailContainer");

if(product){

    let sliderImages = "";

    for(let i=1;i<=5;i++){

        sliderImages += `

        <img src="
        images/${product.category}/${product.folder}/${i}.jpg
        "
        class="
        detail-slide ${i===1 ? 'active' : ''}
        "
        onerror="this.style.display='none'">

        `;

    }

    let specsHtml = "";

    product.specs.forEach(spec=>{

        specsHtml += `
        <li>${spec}</li>
        `;

    });

    detailContainer.innerHTML = `

    <div class="detail-left">

        <div class="detail-slider">

            ${sliderImages}

            <button class="slider-btn prev"
                    onclick="changeSlide(-1)">

                ❮

            </button>

            <button class="slider-btn next"
                    onclick="changeSlide(1)">

                ❯

            </button>

        </div>

    </div>

    <div class="detail-right">

        <h1>
            ${product.name}
        </h1>

        <div class="detail-meta">

            <p>
                <strong>Thương hiệu:</strong>
                ${product.brand}
            </p>

            <p>
                <strong>Xuất xứ:</strong>
                ${product.origin}
            </p>

        </div>

        <div class="detail-description">

            ${product.description}

        </div>

        <div class="detail-specs">

            <h3>
                THÔNG SỐ KỸ THUẬT
            </h3>

            <ul>
                ${specsHtml}
            </ul>

        </div>

        <div class="detail-buttons">

            <button class="buy-btn"
                    onclick="openBuyNow('${product.name}')">

                MUA NGAY

            </button>

            <button class="cart-btn"
                    onclick="openCartPopup('${product.name}')">

                THÊM VÀO GIỎ HÀNG

            </button>

        </div>

    </div>

    `;

}

let currentSlide = 0;

function changeSlide(direction){

    const slides =
    document.querySelectorAll(".detail-slide");

    slides[currentSlide]
    .classList.remove("active");

    currentSlide += direction;

    if(currentSlide < 0){

        currentSlide =
        slides.length - 1;

    }

    if(currentSlide >= slides.length){

        currentSlide = 0;

    }

    slides[currentSlide]
    .classList.add("active");

}

</script>

</body>
