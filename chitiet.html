<script src="products.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const id = Number(params.get("id"));

const product = products.find(p => p.id === id);

if(!product){

    alert("Không tìm thấy sản phẩm!");

    throw new Error("Không tìm thấy sản phẩm");

}

/* THÔNG TIN */

document.getElementById("productName").innerText = product.name;

document.getElementById("productBrand").innerText = product.brand;

document.getElementById("productOrigin").innerText = product.origin;

document.getElementById("productDescription").innerText = product.description;

/* THÔNG SỐ */

const specs = document.getElementById("productSpecs");

product.specs.forEach(spec => {

    if(spec.includes("<table")){

        specs.innerHTML += `
        <div class="spec-table-wrap">
            ${spec}
        </div>
        `;

    }

    else{

        specs.innerHTML += `
        <li>${spec}</li>
        `;

    }

});

/* ẢNH */

const basePath = `images/${product.category}/${product.folder}`;

const images = [];

let currentSlide = 0;

const mainImage = document.getElementById("mainImage");

const thumbList = document.getElementById("thumbList");

/* LOAD ẢNH */

for(let i = 1; i <= 10; i++){

    const imagePath = `${basePath}/${i}.jpg`;

    const img = new Image();

    img.src = imagePath;

    img.onload = function(){

        if(!images.includes(imagePath)){

            images.push(imagePath);

            renderSlider();

        }

    };

}

/* RENDER */

function renderSlider(){

    if(images.length === 0){

        mainImage.src = "images/no-image.jpg";

        return;

    }

    mainImage.src = images[currentSlide];

    thumbList.innerHTML = "";

    images.forEach((img,index)=>{

        thumbList.innerHTML += `

        <img src="${img}"
             class="${index === currentSlide ? 'active-thumb' : ''}"
             onclick="showSlide(${index})">

        `;

    });

}

/* SLIDE */

function showSlide(index){

    currentSlide = index;

    renderSlider();

}

function nextSlide(){

    currentSlide++;

    if(currentSlide >= images.length){

        currentSlide = 0;

    }

    renderSlider();

}

function prevSlide(){

    currentSlide--;

    if(currentSlide < 0){

        currentSlide = images.length - 1;

    }

    renderSlider();

}

/* AUTO */

setInterval(()=>{

    if(images.length > 1){

        nextSlide();

    }

},3000);

/* POPUP */

function openOrderPopup(){

    document.getElementById("orderPopup").style.display = "flex";

}

function closeOrderPopup(){

    document.getElementById("orderPopup").style.display = "none";

}

/* GIỎ HÀNG */

function addToCart(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({

        id: product.id,
        name: product.name,
        image: `${basePath}/1.jpg`

    });

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

    alert("Đã thêm vào giỏ hàng");

}

function updateCartCount(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    document.getElementById("cartCount").innerText = cart.length;

}

updateCartCount();

</script>
