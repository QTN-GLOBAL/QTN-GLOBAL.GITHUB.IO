<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="top-header">

        <div class="logo-area">
            <img src="images/logo.png" alt="QTN GLOBAL">
            <div class="company-info">
                <h2><span style="color:#0d47a1;">QTN</span> <span style="color:#d4a017;">GLOBAL</span></h2>
                <p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>
            </div>
        </div>

        <div class="top-contact">
            <a href="tel:0905913636" class="top-btn">📞 0905 913 636</a>
            <a href="tel:0383598603" class="top-btn">📞 0383 598 603</a>

            <a href="javascript:void(0)" class="cart-header" onclick="openCart()">
                🛒 GIỎ HÀNG (<span id="cartCount">0</span>)
            </a>
        </div>

    </div>
</header>

<!-- DETAIL -->
<div class="detail-page">

    <!-- LEFT -->
    <div class="detail-left">

        <div class="main-image">
            <img id="mainImage">
        </div>

        <div class="thumb-list" id="thumbList"></div>

        <div class="detail-buttons">
            <button class="btn-cart" onclick="openAddCartPopup()">
                <i class="fa-solid fa-cart-shopping"></i> THÊM GIỎ
            </button>

            <button class="btn-buy-now" onclick="openBuyPopup()">
                <i class="fa-solid fa-bolt"></i> MUA NGAY
            </button>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="detail-right">

        <h1 id="productName"></h1>

        <p><b>Hãng:</b> <span id="productBrand"></span></p>
        <p><b>Xuất xứ:</b> <span id="productOrigin"></span></p>

        <h3>Mô tả</h3>
        <p id="productDesc"></p>

        <h3>Thông số kỹ thuật</h3>
        <div id="productSpecs"></div>

    </div>

</div>

<!-- CART -->
<div id="cartOverlay" onclick="closeCart()"></div>
<div id="cartModal">
    <h2>Giỏ hàng</h2>
    <div id="cartBody"></div>
    <button onclick="sendZalo()">Gửi Zalo</button>
</div>

<!-- ADD CART POPUP -->
<div id="addCartPopup" class="popup-overlay">
    <div class="popup-box">

        <span onclick="closeAddCart()">✕</span>

        <h2>THÊM GIỎ HÀNG</h2>

        <img id="popupCartImg">
        <h3 id="popupCartName"></h3>

        <select id="popupCartCapacity"></select>

        <div class="qty-box">
            <button onclick="changeQty('cart',-1)">-</button>
            <input type="number" id="popupCartQty" value="1">
            <button onclick="changeQty('cart',1)">+</button>
        </div>

        <button onclick="confirmAddCart()">THÊM VÀO GIỎ</button>

    </div>
</div>

<!-- BUY POPUP -->
<div id="buyPopup" class="popup-overlay">
    <div class="popup-box">

        <span onclick="closeBuyPopup()">✕</span>

        <h2>THÔNG TIN ĐẶT HÀNG</h2>

        <input id="customerName" placeholder="Tên khách hàng">
        <input id="customerPhone" placeholder="Số điện thoại">
        <input id="customerCompany" placeholder="Công ty">
        <input id="customerTax" placeholder="Mã số thuế">

        <textarea id="customerAddress" placeholder="Địa chỉ giao hàng"></textarea>

        <input id="buyProductName" readonly>

        <select id="buyCapacity"></select>

        <div class="qty-box">
            <button onclick="changeQty('buy',-1)">-</button>
            <input id="buyQty" type="number" value="1">
            <button onclick="changeQty('buy',1)">+</button>
        </div>

        <div class="buy-actions">
            <button onclick="sendOrderZalo()">Gửi Zalo</button>
            <button onclick="sendOrderMessenger()">Messenger</button>
        </div>

    </div>
</div>

<!-- SCRIPT -->
<script src="products.js"></script>
<script src="script.js"></script>

<script>
/* =========================
   LOAD PRODUCT
========================= */

const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

const product = products.find(p => p.id === id);

if (product) {

    // ⭐ FIX GLOBAL PRODUCT
    window.currentProduct = product;

    document.getElementById("productName").innerText = product.name;
    document.getElementById("productBrand").innerText = product.brand;
    document.getElementById("productOrigin").innerText = product.origin;
    document.getElementById("productDesc").innerText = product.description;

    document.getElementById("mainImage").src =
        `images/${product.category}/${product.folder}/main.jpg`;

    // thumbnails
    let thumbHTML = "";
    for (let i = 1; i <= 5; i++) {
        thumbHTML += `
        <img src="images/${product.category}/${product.folder}/${i}.jpg"
        onclick="changeImage(this.src)"
        onerror="this.remove()">`;
    }
    document.getElementById("thumbList").innerHTML = thumbHTML;

    // specs
    let specsHTML = "<ul>";
    product.specs.forEach(s => specsHTML += `<li>${s}</li>`);
    specsHTML += "</ul>";
    document.getElementById("productSpecs").innerHTML = specsHTML;
}

/* =========================
   CHANGE IMAGE
========================= */

function changeImage(src) {
    document.getElementById("mainImage").src = src;
}

/* =========================
   FIX OPEN ADD CART (QUAN TRỌNG)
========================= */

function openAddCartPopup() {

    const p = window.currentProduct;
    if (!p) return;

    selectedProduct = p;

    document.getElementById("addCartPopup").style.display = "flex";

    document.getElementById("popupCartImg").src =
        `images/${p.category}/${p.folder}/main.jpg`;

    document.getElementById("popupCartName").innerText = p.name;

    // 🔥 LẤY MỨC CÂN TỪ SPECS
    let html = "";

    const cap = (p.specs || []).find(s =>
        s.toLowerCase().includes("mức cân")
    );

    if (cap) {
        const value = cap.split(":")[1] || "";
        value.split("/").forEach(v => {
            html += `<option>${v.trim()}</option>`;
        });
    }

    document.getElementById("popupCartCapacity").innerHTML = html;
}

/* =========================
   FIX BUY POPUP
========================= */

function openBuyPopup() {

    const p = window.currentProduct;
    if (!p) return;

    selectedProduct = p;

    document.getElementById("buyPopup").style.display = "flex";
    document.getElementById("buyProductName").value = p.name;
}

</script>

</body>
</html>
