<!DOCTYPE html>

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- =========================
     HEADER
========================= -->

<header class="header">

<div class="top-header">

<div class="logo-area">

<img src="images/logo.png" alt="QTN GLOBAL">

<div class="company-info">

<h2>
<span style="color:#0d47a1;">QTN</span>
<span style="color:#d4a017;">GLOBAL</span>
</h2>

<p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>

</div>

</div>

<div class="top-contact">

<a href="tel:0905913636" class="top-btn">

</a>

<a href="tel:0383598603" class="top-btn">
<i class="fa-solid fa-phone"></i>
0383 598 603
</a>

<a href="https://zalo.me/0383598603"
target="_blank"
class="social-icon zalo">
<span class="zalo-text">Zalo</span>
</a>

<a href="https://m.me/QTNSCALE"
target="_blank"
class="social-icon facebook">

</div>

</div>

<!-- MENU -->

</div>

</div>

</nav>

</header>

<!-- =========================
     DETAIL
========================= -->

<section class="detail-page">

<div class="detail-left">

<img id="mainImage" class="main-image">

<div id="thumbList" class="thumb-list"></div>

<div class="detail-buttons">

<button onclick="openAddCartPopup()">
<i class="fa-solid fa-cart-shopping"></i>
THÊM GIỎ
</button>

<button onclick="openBuyPopup()">
<i class="fa-solid fa-bolt"></i>
MUA NGAY
</button>

</div>

</div>

<div class="detail-right">

<h1 id="productName"></h1>

<p>
<b>Hãng:</b>
<span id="productBrand"></span>
</p>

<p>
<b>Xuất xứ:</b>
<span id="productOrigin"></span>
</p>

<h3>Mô tả</h3>

<p id="productDesc"></p>

<h3>Thông số kỹ thuật</h3>

<div id="productSpecs"></div>

</div>

</section>

<!-- =========================
     GIỎ HÀNG
========================= -->

<div id="cartOverlay"
class="cart-overlay"
onclick="closeCart()">
</div>

<div id="cartModal"
class="cart-modal">

<div class="cart-header">

<h2>Giỏ hàng</h2>

<button onclick="closeCart()">✕</button>

</div>

<div id="cartBody"
class="cart-body">
</div>

</div>

<!-- =========================
     ADD CART POPUP
========================= -->

<div id="addCartPopup"
class="popup-overlay"
style="display:none">

<div class="popup-box">

<span class="popup-close"
onclick="closeAddCart()">
✕
</span>

<h2>THÊM GIỎ HÀNG</h2>

<img id="popupCartImg">

<h3 id="popupCartName"></h3>

<select id="popupCartCapacity"></select>

<div class="qty-box">

<button onclick="changeQty('cart',-1)">
-
</button>

<input id="popupCartQty"
type="number"
value="1">

<button onclick="changeQty('cart',1)">
+
</button>

</div>

<button id="btnAddCart"
class="add-cart-btn">
THÊM
</button>

</div>

</div>

<!-- =========================
     BUY POPUP
========================= -->

<div id="buyPopup"
class="popup-overlay"
style="display:none">

<div class="popup-box buy-box">

<span class="popup-close"
onclick="closeBuyPopup()">
✕
</span>

<h2>ĐẶT HÀNG</h2>

<input id="customerName"
placeholder="Tên khách hàng">

<input id="customerPhone"
placeholder="Số điện thoại">

<input id="customerCompany"
placeholder="Tên công ty">

<input id="customerTax"
placeholder="Mã số thuế">

<textarea id="customerInvoice"
placeholder="Địa chỉ xuất hóa đơn"></textarea>

<textarea id="customerAddress"
placeholder="Địa chỉ giao hàng"></textarea>

<input id="buyProductName" readonly>

<select id="buyCapacity"></select>

<div class="qty-box">

<button onclick="changeQty('buy',-1)">
-
</button>

<input id="buyQty"
type="number"
value="1">

<button onclick="changeQty('buy',1)">
+
</button>

</div>

<button class="zalo-btn"
onclick="sendOrderZalo()">

GỬI ZALO

</button>

<button class="mess-btn"
onclick="sendOrderMessenger()">

GỬI MESSENGER

</button>

</div>

</div>

<!-- =========================
     SCRIPT
========================= -->

<script src="products.js"></script>

<script src="script.js"></script>

<script>

const id =
Number(
new URLSearchParams(location.search).get("id")
);

const product =
products.find(p => p.id === id);

window.currentProduct = product;

if(product){

document.getElementById("productName").innerText =
product.name;

document.getElementById("productBrand").innerText =
product.brand || "";

document.getElementById("productOrigin").innerText =
product.origin || "";

document.getElementById("productDesc").innerText =
product.description || "";

document.getElementById("mainImage").src =
`images/${product.category}/${product.folder}/main.jpg`;

let thumbs = "";

for(let i=1;i<=5;i++){

thumbs += `
<img
src="images/${product.category}/${product.folder}/${i}.jpg"

onclick="
document.getElementById('mainImage').src=this.src
"

onerror="this.remove()"
>
`;
}

document.getElementById("thumbList").innerHTML =
thumbs;

let specsHTML = "";

if(Array.isArray(product.specs)){

specsHTML += "<ul>";

product.specs.forEach(s=>{

specsHTML += `<li>${s}</li>`;

});

specsHTML += "</ul>";

}else{

specsHTML = product.specs;
}

document.getElementById("productSpecs").innerHTML =
specsHTML;

}

</script>

</body>
</html>
