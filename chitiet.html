<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chi tiết</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container detail">

<div class="left">
  <button id="prev">‹</button>
  <img id="img">
  <button id="next">›</button>
</div>

<div class="right">
  <h1 id="name"></h1>
  <p id="desc"></p>
  <ul id="specs"></ul>
</div>

</div>

<script src="products.js"></script>

<script>
const id=new URLSearchParams(location.search).get("id");
const p=products.find(x=>x.id==id);

name.innerText=p.name;
desc.innerText=p.desc;

p.specs.forEach(s=>specs.innerHTML+=`<li>${s}</li>`);

let i=0;
function show(){
  img.src=p.images[i];
  img.onerror=()=>img.src="images/no-image.png";
}

next.onclick=()=>{i=(i+1)%p.images.length;show();}
prev.onclick=()=>{i=(i-1+p.images.length)%p.images.length;show();}

show();
</script>

</body>
</html>
