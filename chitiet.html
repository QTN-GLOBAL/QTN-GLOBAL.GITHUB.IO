<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="detail">

  <img id="img" class="detail-img">

  <h1 id="name"></h1>
  <p id="spec"></p>

  <button onclick="addToCartDetail()">Thêm vào giỏ</button>
  <button onclick="buyNow()">Mua ngay</button>

</div>

<!-- CART -->
<div id="cartOverlay" class="overlay" onclick="closeCart()"></div>

<div id="cartModal" class="cart">

  <div class="cart-header">
    <h2>Giỏ hàng</h2>
    <button onclick="closeCart()">✕</button>
  </div>

  <div id="cartBody"></div>

  <button class="btn-buy" onclick="sendZalo()">Gửi Zalo</button>

</div>

<script src="script.js"></script>

<script>
let product = {
  name: "Cân mẫu",
  spec: "30kg",
  price: ""
};

document.getElementById("name").innerText = product.name;
document.getElementById("spec").innerText = product.spec;
</script>

</body>
</html>
