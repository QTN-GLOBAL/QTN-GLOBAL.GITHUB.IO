<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chi tiết sản phẩm</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- =========================
     HEADER
========================= -->

<header class="header">

<div class="top-header">

<div class="logo-area">
<img src="images/logo.png" alt="QTN GLOBAL">

<div class="company-info">
<h2>
<span style="color:#0d47a1;">QTN</span>
<span style="color:#d4a017;">GLOBAL</span>
</h2>
<p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>
</div>

</div>

<div class="top-contact">

<a href="tel:0905913636">📞 0905 913 636</a>
<a href="tel:0383598603">📞 0383 598 603</a>

<a href="https://zalo.me/0383598603" target="_blank">Zalo</a>
<a href="https://m.me/QTNSCALE" target="_blank">Messenger</a>

<a href="javascript:void(0)" onclick="openCart()">
🛒 GIỎ HÀNG (<span id="cartCount">0</span>)
</a>

</div>

</div>

</header>

<!-- =========================
     DETAIL
========================= -->

<div class="detail-page">

    <div class="detail-left">

        <img id="mainImage">

        <div id="thumbList"></div>

        <div class="detail-buttons">

            <button onclick="openAddCartPopup()">
                🛒 THÊM GIỎ
            </button>

            <button onclick="if(window.currentProduct) openBuyPopup()">
                ⚡ MUA NGAY
            </button>

        </div>

    </div>

    <div class="detail-right">

        <h1 id="productName"></h1>

        <p><b>Hãng:</b> <span id="productBrand"></span></p>
        <p><b>Xuất xứ:</b> <span id="productOrigin"></span></p>

        <h3>Mô tả</h3>
        <p id="productDesc"></p>

        <h3>Thông số</h3>
        <div id="productSpecs"></div>

    </div>

</div>

<!-- =========================
     ADD CART POPUP
========================= -->

<div id="addCartPopup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);">

    <div style="background:#fff; padding:20px; width:400px; margin:auto; margin-top:100px;">

        <span onclick="closeAddCart()">✕</span>

        <h3>THÊM GIỎ HÀNG</h3>

        <img id="popupCartImg" style="width:100%">

        <h4 id="popupCartName"></h4>

        <select id="popupCartCapacity"></select>

        <input id="popupCartQty" type="number" value="1">

        <button onclick="confirmAddCart()">
            THÊM
        </button>

    </div>

</div>

<!-- =========================
     BUY POPUP
========================= -->

<div id="buyPopup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);">

    <div style="background:#fff; padding:20px; width:420px; margin:auto; margin-top:80px;">

        <span onclick="closeBuyPopup()">✕</span>

        <h3>ĐẶT HÀNG</h3>

        <input id="customerName" placeholder="Tên khách hàng">
        <input id="customerPhone" placeholder="Số điện thoại">
        <input id="customerCompany" placeholder="Công ty">
        <input id="customerTax" placeholder="Mã số thuế">

        <textarea id="customerInvoice" placeholder="Địa chỉ xuất hóa đơn"></textarea>
        <textarea id="customerAddress" placeholder="Địa chỉ giao hàng"></textarea>

        <input id="buyProductName" readonly>

        <select id="buyCapacity"></select>

        <input id="buyQty" type="number" value="1">

        <button onclick="sendOrderZalo()">Gửi Zalo</button>
        <button onclick="sendOrderMessenger()">Messenger</button>

    </div>

</div>

<!-- =========================
     SCRIPT
========================= -->

<script src="products.js"></script>
<script src="script.js"></script>

<!-- LOAD PRODUCT -->
<script>

const id = Number(new URLSearchParams(location.search).get("id"));

const product = (window.products || []).find(p => p.id === id);

window.currentProduct = product;

if (product) {

    document.getElementById("productName").innerText = product.name;
    document.getElementById("productBrand").innerText = product.brand;
    document.getElementById("productOrigin").innerText = product.origin;
    document.getElementById("productDesc").innerText = product.description;

    document.getElementById("mainImage").src =
        `images/${product.category}/${product.folder}/main.jpg`;

    let thumbs = "";

    for (let i = 1; i <= 5; i++) {
        thumbs += `
        <img src="images/${product.category}/${product.folder}/${i}.jpg"
             onclick="document.getElementById('mainImage').src=this.src"
             onerror="this.remove()">
        `;
    }

    document.getElementById("thumbList").innerHTML = thumbs;

    let specs = "<ul>";
    product.specs.forEach(s => {
        specs += `<li>${s}</li>`;
    });
    specs += "</ul>";

    document.getElementById("productSpecs").innerHTML = specs;

    document.getElementById("buyProductName").value = product.name;
}

</script>

</body>
</html>
