<!-- DETAIL -->
<div class="detail-page fix-layout">

    <div class="detail-left">

        <img id="mainImage">

        <div id="thumbList"></div>

        <div class="detail-buttons">
            <button onclick="openAddCartPopup()">
                <i class="fa fa-cart-shopping"></i> THÊM GIỎ
            </button>

            <button onclick="openBuyPopup()">
                <i class="fa fa-bolt"></i> MUA NGAY
            </button>
        </div>

    </div>

    <div class="detail-right">
        <h1 id="productName"></h1>

        <p><b>Hãng:</b> <span id="productBrand"></span></p>
        <p><b>Xuất xứ:</b> <span id="productOrigin"></span></p>

        <h3>Mô tả</h3>
        <p id="productDesc"></p>

        <h3>Thông số</h3>
        <div id="productSpecs"></div>
    </div>

</div>

<!-- CART -->
<div id="cartOverlay" onclick="closeCart()"></div>

<div id="cartModal">
    <h2>Giỏ hàng</h2>
    <div id="cartBody"></div>
    <button onclick="sendZalo()">Gửi Zalo</button>
</div>

<!-- ADD CART -->
<div id="addCartPopup" class="popup-overlay">
    <div class="popup-box">

        <span onclick="closeAddCart()">✕</span>

        <h2>THÊM GIỎ HÀNG</h2>

        <img id="popupCartImg">
        <h3 id="popupCartName"></h3>

        <select id="popupCartCapacity"></select>

        <div>
            <button onclick="changeQty('cart',-1)">-</button>
            <input id="popupCartQty" type="number" value="1">
            <button onclick="changeQty('cart',1)">+</button>
        </div>

        <button onclick="confirmAddCart()">THÊM</button>

    </div>
</div>

<!-- BUY -->
<div id="buyPopup" class="popup-overlay">
    <div class="popup-box">

        <span onclick="closeBuyPopup()">✕</span>

        <h2>ĐẶT HÀNG</h2>

        <input id="customerName" placeholder="Tên">
        <input id="customerPhone" placeholder="SĐT">
        <textarea id="customerAddress" placeholder="Địa chỉ"></textarea>

        <input id="buyProductName" readonly>

        <select id="buyCapacity"></select>

        <div>
            <button onclick="changeQty('buy',-1)">-</button>
            <input id="buyQty" type="number" value="1">
            <button onclick="changeQty('buy',1)">+</button>
        </div>

        <button onclick="sendOrder()">GỬI ZALO</button>

    </div>
</div>

<script src="products.js"></script>
<script src="script.js"></script>

<!-- PRODUCT LOAD -->
<script>
const id = Number(new URLSearchParams(location.search).get("id"));
const product = products.find(p => p.id === id);
window.currentProduct = product;

if(product){

    document.getElementById("productName").innerText = product.name;
    document.getElementById("productBrand").innerText = product.brand;
    document.getElementById("productOrigin").innerText = product.origin;
    document.getElementById("productDesc").innerText = product.description;

    document.getElementById("mainImage").src =
        `images/${product.category}/${product.folder}/main.jpg`;

    let thumbs = "";
    for(let i=1;i<=5;i++){
        thumbs += `
        <img src="images/${product.category}/${product.folder}/${i}.jpg"
        onclick="document.getElementById('mainImage').src=this.src"
        onerror="this.remove()">
        `;
    }
    document.getElementById("thumbList").innerHTML = thumbs;

    let specs = "";

product.specs.forEach(s=>{

    if(s.includes("<table")){
        specs += s;
    }else{
        specs += `<p>• ${s}</p>`;
    }

});

document.getElementById("productSpecs").innerHTML = specs;
    document.getElementById("buyProductName").value = product.name;
}
</script>
