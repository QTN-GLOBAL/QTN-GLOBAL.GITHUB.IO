<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header class="header">
  <div class="top-header">
    <div class="logo-area">
      <img src="images/logo.png">
      <div>
        <h2>QTN GLOBAL</h2>
        <p>CHÍNH XÁC TRONG TỪNG GIÁ TRỊ</p>
      </div>
    </div>

    <div class="top-contact">
      <a class="cart-btn" onclick="openCart()">🛒 <span id="cartCount">0</span></a>
    </div>
  </div>
</header>

<section class="detail">

  <div class="detail-left">
    <img id="mainImg">
  </div>

  <div class="detail-right">
    <h2 id="pName"></h2>
    <p id="pDesc"></p>
    <div id="pSpecs"></div>

    <button onclick="addToCart()">➕ Thêm giỏ hàng</button>
    <button onclick="buyNow()">🟢 Mua ngay</button>
  </div>

</section>

<!-- CART -->
<div id="cartModal" class="cart-modal">
  <div class="cart-box">
    <h3>Giỏ hàng</h3>
    <div id="cartBody"></div>
    <button onclick="checkout()">Mua ngay</button>
    <button onclick="closeCart()">Đóng</button>
  </div>
</div>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
