<script>

const params = new URLSearchParams(window.location.search);

const id = Number(params.get("id"));

const product = products.find(p=>p.id === id);

document.getElementById("productName").innerText = product.name;
  
document.getElementById("productOrigin").innerText = product.origin;

document.getElementById("productBrand").innerText = product.brand;

document.getElementById("productDescription").innerText = product.description;

const specs = document.getElementById("productSpecs");

product.specs.forEach(spec=>{

specs.innerHTML += `<li>${spec}</li>`;

});

const basePath = `images/${product.category}/${product.folder}`;

let images = [];

for(let i = 1; i <= 5; i++){

    const img = new Image();

    img.src = `${basePath}/${i}.jpg`;

    img.onload = function(){

        if(!images.includes(img.src)){

            images.push(img.src);

            renderThumbs();

        }

    };

}

function renderThumbs(){

    if(images.length === 0) return;

    mainImage.src = images[currentSlide];

    thumbList.innerHTML = "";

    images.forEach((img,index)=>{

        thumbList.innerHTML += `
        <img src="${img}" onclick="showSlide(${index})">
        `;

    });

}

let currentSlide = 0;

const mainImage = document.getElementById("mainImage");

const thumbList = document.getElementById("thumbList");

function showSlide(index){

currentSlide = index;

mainImage.src = images[index];

}

function nextSlide(){

currentSlide++;

if(currentSlide >= images.length){
currentSlide = 0;
}

mainImage.src = images[currentSlide];

}

function prevSlide(){

currentSlide--;

if(currentSlide < 0){
currentSlide = images.length - 1;
}

mainImage.src = images[currentSlide];

}

setInterval(()=>{

nextSlide();

},3000);
function renderWeightLevels(){

    const orderLevels =
    document.getElementById("orderLevels");

    const cartLevels =
    document.getElementById("cartLevels");

    if(!orderLevels || !cartLevels) return;

    orderLevels.innerHTML = "";
    cartLevels.innerHTML = "";

    let levels = [];

    product.specs.forEach(spec=>{

        if(
            spec.toLowerCase().includes("mức cân")
        ){

            const text =
            spec.split(":")[1];

            if(text){

                levels =
                text.split("/");

            }

        }

    });

    if(levels.length === 0){

        levels = ["Liên hệ"];

    }

    levels.forEach(level=>{

        const cleanLevel = level.trim();

        orderLevels.innerHTML += `
        <div class="cart-row">
            <span>${cleanLevel}</span>

            <input type="number"
                   min="0"
                   value="0">
        </div>
        `;

        cartLevels.innerHTML += `
        <div class="cart-row">
            <span>${cleanLevel}</span>

            <input type="number"
                   min="0"
                   value="0">
        </div>
        `;

    });

}



</script>

<script>
function renderWeightLevels(){

    const orderLevels =
    document.getElementById("orderLevels");

    const cartLevels =
    document.getElementById("cartLevels");

    if(!orderLevels || !cartLevels) return;

    orderLevels.innerHTML = "";
    cartLevels.innerHTML = "";

    let levels = [];

    product.specs.forEach(spec=>{

        // tìm table mức cân
        if(spec.includes("<table")){

            // tạo html tạm
            const tempDiv =
            document.createElement("div");

            tempDiv.innerHTML = spec;

            // lấy tất cả dòng table
            const rows =
            tempDiv.querySelectorAll("tr");

            rows.forEach((row,index)=>{

                // bỏ dòng tiêu đề
                if(index === 0) return;

                const cols =
                row.querySelectorAll("td");

                if(cols.length > 0){

                    const level =
                    cols[0].innerText.trim();

                    levels.push(level);

                }

            });

        }

    });

    // nếu không có
    if(levels.length === 0){

        levels = ["Liên hệ"];

    }

    levels.forEach(level=>{

        orderLevels.innerHTML += `

        <div class="cart-row">

            <span>${level}</span>

            <input type="number"
                   min="0"
                   value="0">

        </div>

        `;

        cartLevels.innerHTML += `

        <div class="cart-row">

            <span>${level}</span>

            <input type="number"
                   min="0"
                   value="0">

        </div>

        `;

    });

}

renderWeightLevels();

</script>
