<!-- ===== POPUP MUA NGAY ===== -->

<div class="popup-overlay"
     id="orderPopup">

    <div class="popup-box order-box">

        <span class="close-popup"
              onclick="closeOrderPopup()">
            &times;
        </span>

        <h2>THÔNG TIN ĐẶT HÀNG</h2>

        <form id="orderForm">

            <input type="text"
                   id="customerName"
                   placeholder="Tên khách hàng"
                   required>

            <input type="text"
                   id="customerPhone"
                   placeholder="Số điện thoại"
                   required>

            <input type="text"
                   id="customerCompany"
                   placeholder="Tên công ty">

            <input type="text"
                   id="customerTax"
                   placeholder="Mã số thuế">

            <input type="text"
                   id="customerInvoice"
                   placeholder="Địa chỉ xuất hóa đơn">

            <input type="text"
                   id="customerAddress"
                   placeholder="Địa chỉ giao hàng">

            <div class="popup-product">

                <h3 id="popupProductName"></h3>

                <label>Chọn mức cân</label>

                <select id="weightLevel"></select>

                <label>Số lượng</label>

                <input type="number"
                       id="orderQty"
                       min="1"
                       value="1">

            </div>

            <div class="popup-buttons">

                <button type="button"
                        class="zalo-btn"
                        onclick="sendToZalo()">

                    GỬI QUA ZALO

                </button>

                <button type="button"
                        class="messenger-btn"
                        onclick="sendToMessenger()">

                    GỬI QUA MESSENGER

                </button>

            </div>

        </form>

    </div>

</div>



<!-- ===== POPUP GIỎ HÀNG ===== -->

<div class="popup-overlay"
     id="cartPopup">

    <div class="popup-box cart-box">

        <span class="close-popup"
              onclick="closeCartPopup()">
            &times;
        </span>

        <h2>THÊM VÀO GIỎ HÀNG</h2>

        <div class="popup-product">

            <h3 id="cartProductName"></h3>

            <label>Chọn mức cân</label>

            <select id="cartWeightLevel"></select>

            <label>Số lượng</label>

            <input type="number"
                   id="cartQty"
                   min="1"
                   value="1">

        </div>

        <button class="add-cart-btn"
                onclick="addToCart()">

            THÊM VÀO GIỎ

        </button>

    </div>

</div>



<!-- ===== POPUP XEM GIỎ HÀNG ===== -->

<div class="popup-overlay"
     id="viewCartPopup">

    <div class="popup-box view-cart-box">

        <span class="close-popup"
              onclick="closeViewCartPopup()">
            &times;
        </span>

        <h2>GIỎ HÀNG</h2>

        <div id="cartItems"></div>

    </div>

</div>



<script>

/* =========================
   LẤY DANH SÁCH MỨC CÂN
========================= */

function extractLevels(){

    let levels = [];

    const tableHTML = product.specs[0];

    const temp = document.createElement("div");

    temp.innerHTML = tableHTML;

    const rows = temp.querySelectorAll("tr");

    rows.forEach((row,index)=>{

        if(index === 0) return;

        const firstCell = row.querySelector("td");

        if(firstCell){

            levels.push(firstCell.innerText);

        }

    });

    return levels;

}



/* =========================
   MỞ POPUP MUA NGAY
========================= */

function openOrderPopup(){

    document.getElementById("orderPopup")
            .classList.add("active");

    document.getElementById("popupProductName")
            .innerText = product.name;

    const select = document.getElementById("weightLevel");

    select.innerHTML = "";

    extractLevels().forEach(level=>{

        select.innerHTML += `
        <option value="${level}">
            ${level}
        </option>
        `;

    });

}



/* =========================
   ĐÓNG POPUP MUA NGAY
========================= */

function closeOrderPopup(){

    document.getElementById("orderPopup")
            .classList.remove("active");

}



/* =========================
   GỬI ZALO
========================= */

function sendToZalo(){

    const name =
    document.getElementById("customerName").value;

    const phone =
    document.getElementById("customerPhone").value;

    const company =
    document.getElementById("customerCompany").value;

    const tax =
    document.getElementById("customerTax").value;

    const invoice =
    document.getElementById("customerInvoice").value;

    const address =
    document.getElementById("customerAddress").value;

    const level =
    document.getElementById("weightLevel").value;

    const qty =
    document.getElementById("orderQty").value;

    const message = `ĐƠN HÀNG QTN GLOBAL

Tên khách hàng: ${name}

Số điện thoại: ${phone}

Tên công ty: ${company}

Mã số thuế: ${tax}

Địa chỉ xuất hóa đơn: ${invoice}

Địa chỉ giao hàng: ${address}

Sản phẩm: ${product.name}

Mức cân: ${level}

Số lượng: ${qty}`;

    const zaloURL =
    `https://zalo.me/0383598603`;

    window.open(zaloURL,"_blank");

}



/* =========================
   GỬI MESSENGER
========================= */

function sendToMessenger(){

    window.open(
    "https://m.me/QTNSCALE",
    "_blank"
    );

}



/* =========================
   POPUP THÊM GIỎ HÀNG
========================= */

function openCartPopup(){

    document.getElementById("cartPopup")
            .classList.add("active");

    document.getElementById("cartProductName")
            .innerText = product.name;

    const select =
    document.getElementById("cartWeightLevel");

    select.innerHTML = "";

    extractLevels().forEach(level=>{

        select.innerHTML += `
        <option value="${level}">
            ${level}
        </option>
        `;

    });

}



function closeCartPopup(){

    document.getElementById("cartPopup")
            .classList.remove("active");

}



/* =========================
   THÊM VÀO GIỎ
========================= */

function addToCart(){

    const level =
    document.getElementById("cartWeightLevel").value;

    const qty =
    document.getElementById("cartQty").value;

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({

        id: product.id,

        name: product.name,

        level: level,

        qty: qty

    });

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    updateCartCount();

    alert("Đã thêm vào giỏ hàng");

    closeCartPopup();

}



/* =========================
   ĐẾM GIỎ HÀNG
========================= */

function updateCartCount(){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    document.getElementById("cartCount")
            .innerText = cart.length;

}

updateCartCount();



/* =========================
   XEM GIỎ HÀNG
========================= */

function openViewCartPopup(){

    document.getElementById("viewCartPopup")
            .classList.add("active");

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    let html = "";

    if(cart.length === 0){

        html = "<p>Chưa có sản phẩm nào.</p>";

    }else{

        cart.forEach((item,index)=>{

            html += `

            <div class="cart-item">

                <h4>${item.name}</h4>

                <p>Mức cân: ${item.level}</p>

                <p>Số lượng: ${item.qty}</p>

                <button onclick="removeCart(${index})">

                    Xóa

                </button>

            </div>

            `;

        });

    }

    document.getElementById("cartItems")
            .innerHTML = html;

}



function closeViewCartPopup(){

    document.getElementById("viewCartPopup")
            .classList.remove("active");

}



/* =========================
   XÓA GIỎ HÀNG
========================= */

function removeCart(index){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index,1);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    updateCartCount();

    openViewCartPopup();

}

</script>
